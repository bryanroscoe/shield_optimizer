# Shield Optimizer desktop-app release pipeline.
#
# Trigger: push of a `desktop-*` tag (matches `desktop-0.1.0`,
# `desktop-0.1.0-rc1`, etc.). The legacy `v2-*` prefix is still accepted so old
# tags can be re-run. The `desktop-`/`v2-` prefix is just the release-track
# namespace; everything human-facing (release title, Homebrew, changelog) uses
# the bare semver after it. v1's `v0.x.x` PowerShell tags do NOT fire this —
# the two tracks stay separate.
#
# What runs:
#   - ubuntu-22.04 → .deb, .AppImage, .rpm
#   - macos-latest → universal .dmg / .app.tar.gz (Apple Silicon + Intel)
#   - windows-latest → .msi + .exe
# All artifacts land on a GitHub Release for the tag.
#
# Signing: intentionally unsigned. Users will see the macOS "unidentified
# developer" Gatekeeper prompt and the Windows SmartScreen warning on first
# launch — both are dismissible. See README's release section for the
# documented workaround. When we're ready to add signing:
#   - SIGNING(macOS): set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID as
#     repo secrets and tauri-action picks them up automatically.
#   - SIGNING(Windows): an EV cert ($300-500/yr) buys immediate SmartScreen
#     trust. Add WINDOWS_CERTIFICATE + WINDOWS_CERTIFICATE_PASSWORD and
#     tauri-action signs the .msi / .exe.

name: v2 Release

on:
  push:
    tags:
      - 'desktop-*'
      - 'v2-*' # legacy prefix — still accepted for older / re-run tags
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (manual dispatch only — overrides the trigger tag for testing)'
        required: false

permissions:
  contents: write

jobs:
  # Compute the release notes once on a cheap runner and share the body with
  # every per-OS bundler job. Two sources:
  #   1. If v2/CHANGELOG.md contains a section for this version, use it verbatim.
  #      Format: a `## X.Y.Z` heading followed by Markdown until the next
  #      `## ` heading. This is the rich, human-written path — mirrors how
  #      v1 wrote its release bodies.
  #   2. Otherwise auto-generate from `git log <prev-tag>..<this-tag>`.
  notes:
    name: Build release notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.compose.outputs.body }}
      tag: ${{ steps.compose.outputs.tag }}
      version: ${{ steps.compose.outputs.version }}
      prerelease: ${{ steps.compose.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: compose
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          # Strip the release-track prefix (desktop- now, v2- historically) to
          # the bare semver used everywhere human-facing.
          version="${tag#*-}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Prerelease detection: any tag containing one of the standard
          # pre-release markers becomes a GitHub prerelease. Covers
          # desktop-0.1.0-beta, -beta.1, -rc1, -alpha, -preview, -pre.
          if [[ "$tag" =~ -(alpha|beta|rc|preview|pre)([.-]?[0-9]+)?$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          # CHANGELOG sections are headed by the bare version (`## 1.2.3`).
          # Older entries used the full prefixed tag (`## v2-2.1.0`) — accept
          # either so re-running an old tag still finds its notes.
          changelog="v2/CHANGELOG.md"
          body=""
          if [[ -f "$changelog" ]]; then
            if grep -q "^## $version\b" "$changelog"; then
              heading="## $version"
            elif grep -q "^## $tag\b" "$changelog"; then
              heading="## $tag"
            else
              heading=""
            fi
            if [[ -n "$heading" ]]; then
              echo "Pulling notes for '$heading' from $changelog"
              body=$(awk -v tag="$heading" '
                $0 ~ "^"tag {flag=1; next}
                flag && /^## / {flag=0}
                flag {print}
              ' "$changelog")
            fi
          fi

          if [[ -z "$body" ]]; then
            echo "No CHANGELOG entry for $tag — auto-generating from git log."
            prev=$(git tag --list 'desktop-*' 'v2-*' --sort=-v:refname | grep -v "^$tag$" | head -1 || true)
            if [[ -n "$prev" ]]; then
              range="$prev..$tag"
              body="### Changes since $prev"$'\n\n'
            else
              range="$tag"
              body="### Initial release"$'\n\n'
            fi
            log=$(git log --no-merges --pretty=format:'- %s (%h)' "$range" -- v2/ '.github/workflows/v2-*' 2>/dev/null || true)
            if [[ -z "$log" ]]; then
              log=$(git log --no-merges --pretty=format:'- %s (%h)' "$range" 2>/dev/null || true)
            fi
            body+="$log"
          fi

          # Always append the first-run dismissal block so users know what to
          # expect from an unsigned build.
          body+=$'\n\n'"### First-run warnings"$'\n\n'
          body+="These builds are unsigned. Your OS may complain on first launch:"$'\n\n'
          body+="- **macOS** (Gatekeeper): the first-launch dialog on macOS 15+ only offers \"Move to Trash\" or \"Done\" — click **Done**, then either:"$'\n'
          body+="    - **Terminal:** \`xattr -dr com.apple.quarantine \"/Applications/Shield Optimizer.app\"\` (one-time, then double-click as normal)"$'\n'
          body+="    - **GUI:** System Settings → Privacy & Security → scroll to the \"Shield Optimizer was blocked\" message → **Open Anyway** → enter password"$'\n'
          body+="- **Windows** (SmartScreen): \"More info\" → \"Run anyway\"."$'\n'
          body+="- **Linux**: \`chmod +x ShieldOptimizer*.AppImage\` before running."$'\n\n'
          body+="See the [v2 README](https://github.com/${{ github.repository }}/blob/main/v2/README.md) for setup and feature docs."

          # Emit as a multi-line output.
          {
            echo "body<<NOTES_EOF"
            echo "$body"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: notes
    name: Build on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
            args: ''
          - os: macos-latest
            label: macOS (universal)
            args: '--target universal-apple-darwin'
          - os: windows-latest
            label: Windows
            args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need history so we can diff against the previous release tag for
          # auto-generated release notes.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both arches needed for the universal macOS target. No-op on the
          # Linux/Windows runners — rustup just notes the target is supported.
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v2/src-tauri/target
          key: ${{ runner.os }}-cargo-v2-release-${{ hashFiles('v2/src-tauri/Cargo.lock') }}

      # Tauri's bundler on Linux needs webkit2gtk and friends. Pinning to
      # 22.04 because 24.04 ships libwebkit2gtk-4.1 only under a slightly
      # different package name on noble/oracular.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: v2
        run: npm ci

      # tauri-action handles: running beforeBuildCommand (npm run build),
      # invoking `cargo tauri build`, collecting bundle outputs, creating
      # (or updating) the GitHub release, and uploading every artifact.
      - name: Build + publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: v2
          tagName: ${{ needs.notes.outputs.tag }}
          releaseName: 'Shield Optimizer ${{ needs.notes.outputs.version }}'
          releaseBody: ${{ needs.notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ needs.notes.outputs.prerelease == 'true' }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # The AppImage bundles Ubuntu 22.04's libwayland-*, which shadows the
      # host's copy and breaks EGL display creation on newer Wayland stacks
      # ("Could not create default EGL display: EGL_BAD_PARAMETER" on
      # CachyOS/Arch + KDE — issue #60; the reporter's LD_PRELOAD of the
      # system libwayland-client confirmed the diagnosis). Upstream
      # linuxdeploy excludes libwayland for exactly this reason; Tauri's
      # bundler doesn't yet, so strip it here, repack, and replace the asset
      # tauri-action already uploaded.
      - name: Strip bundled libwayland from AppImage (issue #60)
        if: matrix.os == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.notes.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=(v2/src-tauri/target/release/bundle/appimage/*.AppImage)
          [ ${#appimages[@]} -eq 1 ] || { echo "expected exactly one AppImage, found: ${appimages[*]}"; exit 1; }
          appimage="${appimages[0]}"

          curl -fsSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  /tmp/appimagetool" | sha256sum -c -
          chmod +x /tmp/appimagetool

          workdir=$(mktemp -d)
          (cd "$workdir" && "$GITHUB_WORKSPACE/$appimage" --appimage-extract >/dev/null)
          # nullglob is on: if a future Tauri bundler stops bundling libwayland
          # (upstream linuxdeploy already excludes it), this becomes a no-op
          # skip instead of a failed release.
          stale=("$workdir"/squashfs-root/usr/lib/libwayland-*.so*)
          if [ ${#stale[@]} -eq 0 ]; then
            echo "no bundled libwayland found — bundler fixed upstream; skipping repack"
            exit 0
          fi
          rm -v "${stale[@]}"

          # --appimage-extract-and-run: the tool itself is an AppImage and the
          # runner may lack FUSE.
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run \
            "$workdir/squashfs-root" "$appimage"

          # Replace the unpatched asset tauri-action uploaded. GitHub turns
          # spaces in filenames into dots, so the names match up.
          gh release upload "$TAG" "$appimage" --clobber
          echo "patched + re-uploaded: $appimage"

  # Bump the Homebrew tap (bryanroscoe/homebrew-shield-optimizer) to point at
  # the new universal macOS DMG. Runs after all three bundlers succeed so the
  # asset is guaranteed to be on the GitHub Release before we reference it.
  # Requires the HOMEBREW_TAP_TOKEN secret — a fine-grained PAT scoped to
  # bryanroscoe/homebrew-shield-optimizer with contents:write. If the secret
  # is missing, this job is skipped (not failed) so the rest of the release
  # still ships.
  bump-tap:
    needs: [notes, build]
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Check secret presence
        id: secret
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.secret.outputs.skip == 'false'
        uses: actions/checkout@v5
        with:
          repository: bryanroscoe/homebrew-shield-optimizer
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        if: steps.secret.outputs.skip == 'false'
        working-directory: tap
        env:
          TAG: ${{ needs.notes.outputs.tag }}
          VERSION: ${{ needs.notes.outputs.version }}
        run: |
          set -euo pipefail
          # Bare semver (tag with the desktop-/v2- track prefix stripped).
          version="$VERSION"
          dmg_url="https://github.com/${{ github.repository }}/releases/download/${TAG}/Shield.Optimizer_${version}_universal.dmg"

          echo "Fetching $dmg_url to compute SHA256…"
          # The release upload may take a beat to surface; retry briefly.
          for attempt in 1 2 3 4 5; do
            if curl -fsSL -o /tmp/sho.dmg "$dmg_url"; then
              break
            fi
            echo "  attempt $attempt failed, retrying in 10s…"
            sleep 10
          done
          [[ -s /tmp/sho.dmg ]] || { echo "Failed to download $dmg_url"; exit 1; }
          sha=$(sha256sum /tmp/sho.dmg | awk '{print $1}')
          echo "SHA256: $sha"

          python3 - <<PY
          import pathlib, re
          p = pathlib.Path("Casks/shield-optimizer.rb")
          t = p.read_text()
          t, n1 = re.subn(r'version "[^"]+"', f'version "$version"', t, count=1)
          assert n1 == 1, "version line not found in cask"
          t, n2 = re.subn(r'sha256 "[a-f0-9]{64}"', f'sha256 "$sha"', t, count=1)
          assert n2 == 1, "sha256 line not found in cask"
          p.write_text(t)
          PY

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/shield-optimizer.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date; nothing to commit."
          else
            git commit -m "Bump shield-optimizer to $version"
            git push
            echo "Tap updated to $version."
          fi

  # Merge the per-OS latest.json files that tauri-action uploaded and commit the
  # result to v2/updater/latest.json on the default branch. The Tauri updater
  # plugin reads this file to decide whether an update is available. Each matrix
  # leg uploads its own latest.json (last writer wins on the release asset), so
  # we download the release asset, which already contains the merged platforms
  # from tauri-action's built-in asset-update logic. We then commit it to the
  # repo so the raw.githubusercontent endpoint in tauri.conf.json resolves.
  merge-updater:
    needs: [notes, build]
    name: Publish updater manifest
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest.json from release
        env:
          TAG: ${{ needs.notes.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p v2/updater

          # tauri-action may take a moment to finalize the asset; retry a few times.
          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --pattern 'latest.json' --dir /tmp --clobber; then
              break
            fi
            echo "  attempt $attempt: latest.json not ready, retrying in 15s…"
            sleep 15
          done
          [[ -f /tmp/latest.json ]] || { echo "latest.json not found on release $TAG"; exit 1; }

          cp /tmp/latest.json v2/updater/latest.json
          echo "Updater manifest for $TAG:"
          cat v2/updater/latest.json

      - name: Commit updater manifest
        env:
          TAG: ${{ needs.notes.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v2/updater/latest.json
          if git diff --cached --quiet; then
            echo "Updater manifest unchanged; nothing to commit."
          else
            git commit -m "Update updater manifest for ${TAG}"
            # refresh-screenshots also commits to the default branch in parallel,
            # so rebase-and-retry to avoid a non-fast-forward push race.
            branch="${{ github.event.repository.default_branch }}"
            for attempt in 1 2 3 4 5; do
              if git push origin "HEAD:$branch"; then break; fi
              echo "  push attempt $attempt rejected; rebasing on origin/$branch…"
              git pull --rebase origin "$branch"
              [[ $attempt -eq 5 ]] && { echo "push still failing after rebase"; exit 1; }
            done
            echo "Updater manifest published for ${TAG}."
          fi

  # Regenerate the README gallery GIF from the released UI and commit it back
  # to the default branch, so the screenshots never drift from what shipped.
  # Runs after the build succeeds (no point refreshing for a release that
  # failed to bundle). Uses the demo fixture layer (VITE_DEMO=1) — no device.
  #
  # NOTE: captures render on Linux, so the font stack falls through to Roboto
  # (installed below) rather than macOS's -apple-system. The GIF will look
  # slightly different from one regenerated locally on a Mac; that's expected
  # and accepted as the price of hands-off release-time refresh.
  refresh-screenshots:
    needs: [notes, build]
    name: Regenerate gallery GIF
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install ffmpeg + a font the app's stack resolves to
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto

      - name: Install frontend dependencies
        working-directory: v2
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: v2
        run: npx playwright install --with-deps chromium

      - name: Regenerate gallery
        working-directory: v2
        run: npm run screenshots

      - name: Commit if the galleries changed
        working-directory: v2
        env:
          TAG: ${{ needs.notes.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- screenshots/gallery.gif screenshots/gallery-light.gif; then
            echo "Galleries unchanged; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots/gallery.gif screenshots/gallery-light.gif
          git commit -m "Regenerate gallery GIFs for ${TAG}"
          # merge-updater also commits to the default branch in parallel, so
          # rebase-and-retry to avoid a non-fast-forward push race.
          branch="${{ github.event.repository.default_branch }}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:$branch"; then break; fi
            echo "  push attempt $attempt rejected; rebasing on origin/$branch…"
            git pull --rebase origin "$branch"
            [[ $attempt -eq 5 ]] && { echo "push still failing after rebase"; exit 1; }
          done
          echo "Galleries refreshed for ${TAG}."
